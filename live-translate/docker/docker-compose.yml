services:
  asr:
    image: lucashornung/live-translate-asr:latest
    ports:
      - "8001:8001"
    environment:
      - WHISPER_MODEL_SIZE=${WHISPER_MODEL_SIZE:-base}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-auto}
    restart: unless-stopped

  translation:
    image: lucashornung/live-translate-translation:latest
    ports:
      - "8002:8002"
    environment:
      - TRANSLATION_PROVIDER=${TRANSLATION_PROVIDER:-opus-mt}
      - TRANSLATION_MODEL=${TRANSLATION_MODEL:-}
      - TRANSLATION_API_KEY=${TRANSLATION_API_KEY:-}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
    restart: unless-stopped

  tts:
    image: lucashornung/live-translate-tts:latest
    ports:
      - "8003:8003"
    restart: unless-stopped

  orchestrator:
    image: lucashornung/live-translate-orchestrator:latest
    ports:
      - "8000:8000"
    environment:
      - ASR_URL=http://asr:8001
      - TRANSLATION_URL=http://translation:8002
      - TTS_URL=http://tts:8003
    depends_on:
      - asr
      - translation
      - tts
    restart: unless-stopped
